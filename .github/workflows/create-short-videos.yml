name: ショート動画作成・投稿

on:
  workflow_run:
    workflows: ["ロング動画作成・投稿"]
    types: [completed]

jobs:
  create-shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: ffmpeg・日本語フォント キャッシュ
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-fonts-${{ runner.os }}

      - name: ffmpeg・日本語フォント インストール
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-noto-cjk

      - name: 依存関係インストール
        run: npm ci

      - name: ロング動画の成果物をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: output-${{ github.event.workflow_run.id }}
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: metadata.json を検索してショート動画を作成・投稿
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_OAUTH_TOKEN_JSON: ${{ secrets.YOUTUBE_OAUTH_TOKEN_JSON }}
        run: |
          for metadata in $(find output/videos -name "metadata.json"); do
            echo "📄 処理中: $metadata"
            npm run create-shorts -- "$metadata"
          done

      - name: 成果物を保存（デバッグ用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-output-${{ github.run_id }}
          path: output/shorts/
          retention-days: 3
